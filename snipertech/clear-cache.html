<!DOCTYPE html>
<html>
<head><title>Clear Cache</title>
<style>body{background:#05070D;color:#EAF1FB;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;margin:0;}
.btn{background:#2682FF;color:#fff;border:none;padding:16px 32px;border-radius:12px;font-size:16px;cursor:pointer;font-weight:700;}
.status{font-size:14px;color:#7FC0FF;}</style>
</head>
<body>
<div style="font-size:48px">🧹</div>
<h2>SniperTech AI — Clear Cache</h2>
<div class="status" id="s">Clearing...</div>
<button class="btn" onclick="go()">↪ Open App</button>
<script>
async function clear() {
  var log = [];
  // Kill all service workers
  if('serviceWorker' in navigator) {
    var regs = await navigator.serviceWorker.getRegistrations();
    for(var r of regs) { await r.unregister(); log.push('SW removed'); }
  }
  // Delete all caches
  if(window.caches) {
    var keys = await caches.keys();
    for(var k of keys) { await caches.delete(k); log.push('Cache: '+k+' deleted'); }
  }
  document.getElementById('s').textContent = 'Done! ' + (log.length ? log.join(', ') : 'Nothing to clear') + ' — Click button to open app';
}
function go() { window.location.href = '/?nocache='+Date.now(); }
clear();
</script>
</body>
</html>
