<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#05070D"/>
  <title>SniperTech AI</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" href="icon-192.png"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="SniperTech AI"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Noto+Sans+Lao:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    html,body{margin:0;padding:0;background:#05070D;}*{box-sizing:border-box;}#root{min-height:100vh;}
    #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;background:#05070D;color:#EAF1FB;text-align:center;font-family:'Sora','Noto Sans Lao',system-ui,sans-serif;}
    #boot .name{font-size:24px;font-weight:700;}
    #boot .name span{background:linear-gradient(95deg,#A9E0FF,#2682FF);-webkit-background-clip:text;background-clip:text;color:transparent;}
    #boot .bar{width:180px;height:3px;border-radius:99px;background:#0A0E18;overflow:hidden;}
    #boot .bar i{display:block;height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,#A9E0FF,#2682FF);animation:ld 1.1s ease-in-out infinite;}
    @keyframes ld{0%{transform:translateX(-100%);}100%{transform:translateX(350%);}}
    #boot .err{display:none;max-width:460px;margin-top:6px;font-size:12px;line-height:1.6;color:#FFB4B4;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.4);border-radius:12px;padding:12px;}
    #boot .hint{font-size:12px;color:#8794AE;}
  </style>
</head>
<body>
<div id="root">
  <div id="boot">
    <div style="font-size:56px">🎯</div>
    <div class="name">Sniper<span>Tech</span> AI</div>
    <div class="bar"><i></i></div>
    <div class="hint" id="bootHint">Loading...</div>
    <div class="err" id="bootErr"></div>
  </div>
</div>

<script>
// Kill old service workers
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});});
}
if(window.caches){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}

function showErr(msg){
  var e=document.getElementById('bootErr'),h=document.getElementById('bootHint'),b=document.querySelector('#boot .bar');
  if(b)b.style.display='none';
  if(h)h.textContent='Load failed — try refreshing or 4G';
  if(e){e.style.display='block';e.textContent=String(msg).slice(0,400);}
}
window.onerror=function(m,s,l,c,err){showErr(m+(err?' — '+err.message:''));};

// Load React then app.js
function loadJs(src,cb){
  var s=document.createElement('script');s.src=src;s.crossOrigin='anonymous';
  s.onload=cb;s.onerror=function(){showErr('Failed to load: '+src);};
  document.head.appendChild(s);
}

loadJs('https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js', function(){
  loadJs('https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js', function(){
    loadJs('app.js', function(){
      // app.js has its own mount code
    });
  });
});
</script>
</body>
</html>
